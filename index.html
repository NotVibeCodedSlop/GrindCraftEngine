<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, interactive-widget=resizes-content">
    <title>Grindcraft</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #000000;
            --grid-bg: #8b8b8b;
            --item-bg: #aeaeae;
            --text-color: #ffffff;
            --highlight: #ffff00;
        }
        #map-container {
            width: 1230px; /* Original image size */
            height: 1230px;
            transform-origin: 0 0; /* Important: zoom from top-left */
            position: relative;
            transition: transform 0.1s ease-out; /* Optional: smooth movement */
            -webkit-user-drag: none; /* Stops the browser from trying to drag the image */
            user-select: none;      /* Stops text highlighting from interfering */
            pointer-events: auto;   /* Keep clicks working */
        }
        #map-viewport {
            width: 600px; /* Window size */
            max-width:90dvw;
            height: 600px;
            overflow: hidden; /* Clips the map so it stays in the box */
            cursor: grab;
            z-index:54545;
            border: 2px solid #333;
        }
        .map-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            object-fit: contain;
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .map-marker:hover::after {
            content: attr(data-name);
            position: absolute;
            top: -25px;
            background: black;
            padding: 2px 5px;
            white-space: nowrap;
        }
        /* Prevent dragging images and text */
        img,
        .grinder-btn,
        .craft-item {
            -webkit-user-drag: none;
            user-select: none;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
    touch-action: none; /* Disables browser scrolling/zooming */
    overflow: hidden;   /* Prevents the page from moving */
    overscroll-behavior: none;
        }
        /* Left Column: Grind & Achievements */
        #left-panel {
            width: 320px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333;
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 10px 0;
        }

        /* Grinder Buttons */
        .grinder-btn {
            width: 100%;
            height: 80px;
            background-color: #ccc;
            border: 3px solid #fff;
            border-radius: 4px;
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .grinder-btn:active {
            transform: scale(0.98);
        }

        .grinder-btn .bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 1;
        }

        .grinder-btn span {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black;
            font-weight: bold;
            font-size: 18px;
            text-transform: capitalize;
        }
        body {
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
}
        .grinder-btn img.icon {
            position: relative;
            z-index: 2;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 4px;
            border: 2px solid #222;
            image-rendering: pixelated;
            object-fit: contain;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background-color: #00ff00;
            width: 0%;
            z-index: 3;
        }

        /* Achievements Section */
        #achievements-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #achievements-container h2 {
            color: var(--highlight);
            text-align: center;
            font-weight: normal;
            margin-bottom: 10px;
        }

        #achievements-list {
            overflow-y: auto;
            flex: 1;
        }

        .achievement {
            background: #333;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--highlight);
        }

        #reset-btn {
            margin-top: 10px;
            background: #550000;
            color: white;
            border: 1px solid #ff0000;
            padding: 5px;
            cursor: pointer;
            border-radius: 3px;
        }

        #reset-btn:hover {
            background: #ff0000;
        }

        /* Right Column: Craft Grid */
        #right-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        #craft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
            gap: 4px;
            background-color: #fff;
            padding: 4px;
            overflow-y: auto;
            align-content: start;
        }

        /* Individual Craft Item Box */
        .craft-item {
            width: 64px;
            height: 64px;
            background-color: var(--item-bg);
            position: relative;
            cursor: pointer;
            border-top: 3px solid #cccccc;
            border-left: 3px solid #cccccc;
            border-bottom: 3px solid #7a7a7a;
            border-right: 3px solid #828282;
            box-sizing: border-box;
            transition: background-color 0.1s, opacity 0.1s;
        }

        .craft-item:active:not(.disabled) {
            border-top: 3px solid #222;
            border-left: 3px solid #222;
            border-bottom: 3px solid #888;
            border-right: 3px solid #888;
        }

        .craft-item.disabled {
            opacity: 1;
            cursor: not-allowed;
            border-top: 3px solid #3d3d3d;
            border-right: 3px solid #878787;
            border-left: 3px solid #3e3e3e;
            border-top: 3px solid #3e3e3e;
            background-color: #5e5e5e;
        }

        /* Hover Highlight Classes */
        .craft-item.highlight-have {
            opacity: 1 !important;
            background-color: #888888 !important;
            /* Gray */
            border-color: #aaaaaa !important;
        }

        .craft-item.highlight-lack {
            opacity: 1 !important;
            background-color: #aa0000 !important;
            /* Red */
            border-color: #ff4444 !important;
        }

        .craft-item img {
            width: 40px;
            height: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            object-fit: contain;
        }

        .craft-item .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            color: white;
            font-weight: bold;
            pointer-events: none;
        }

        /* Tooltip */
        /* --- Tooltip Overhaul --- */
        .tooltip {
            position: fixed;
            background-color: #c6c6c6;
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-bottom: 3px solid #555555;
            border-right: 3px solid #555555;
            padding: 8px;
            color: #ffffff;
            text-shadow: 1px 1px 0 #333;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 1009;
            min-width: 120px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            position: fixed !important; /* Force it to stay out of the document flow */
    pointer-events: none !important; /* The most important: ignore all mouse/touch */
    z-index: 999999 !important;      /* Sit on top of everything visually */
    display: none;                   /* Default hidden */
    /* Ensure it doesn't have any margins or padding that create a hitbox */
    margin: 0;
    padding: 8px;
        }

        .tooltip-title {
            font-size: 16px;
            margin-bottom: 6px;
        }

        /* Crafter Tooltip Styles */
        .tooltip-ingredients {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 8px;
        }

        .ingredient-box {
            width: 48px;
            height: 48px;
            background-color: #8b8b8b;
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-bottom: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
            position: relative;
            box-sizing: border-box;
        }

        .ingredient-box img {
            width: 32px;
            height: 32px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            object-fit: contain;
            -webkit-user-drag: none;
        }

        .ingredient-box .qty {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            color: white;
        }

        .tooltip-desc {
            color: #ffffff;
            font-size: 12px;
            max-width: 180px;
            line-height: 1.2;
        }

        /* Grinder Tooltip Styles */
        .grind-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .grind-row img {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
            object-fit: contain;
            -webkit-user-drag: none;
        }

        .grind-row .arrow-icon {
            width: 32px;
            height: 24px;
            object-fit: contain;
            opacity: 0.6;
        }

        .dep-badge {
            display: inline-block;
            padding: 2px 5px;
            margin: 2px;
            border-radius: 3px;
            color: white;
            font-size: 10px;
            text-transform: capitalize;
        }

        /* --- Header Controls --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-controls {
            display: flex;
            gap: 4px;
        }

        .ctrl-btn {
            width: 28px;
            height: 28px;
            background: linear-gradient(to bottom, #eeeeee, #aaaaaa);
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #555555;
            border-right: 2px solid #555555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #000;
            font-weight: bold;
            user-select: none;
        }

        .ctrl-btn:active {
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-bottom: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
            background: #cccccc;
        }

        /* --- Grinder UI Updates --- */
        .grinder-btn .icon-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            background: #000000;
            border-radius: 8px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Remove old border/bg from .icon since icon-wrapper handles it now */
        .grinder-btn img.icon {
            width: 48px;
            height: 48px;
            background: transparent;
            border: none;
            padding: 0;
            position: relative;
            z-index: 2;
            image-rendering: pixelated;
            object-fit: contain;
            -webkit-user-drag: none;
        }

        .progress-container {
            position: absolute;
            bottom: 6px;
            left: 5px;
            width: 46px;
            /* Fits inside the black box */
            height: 6px;
            background-color: #ff0000;
            /* Red background */
            z-index: 3;
        }

        .progress-bar {
            position: static;
            /* Overrides previous absolute positioning */
            height: 100%;
            background-color: #00ff00;
            /* Green Fill */
            width: 0%;
        }

        .active-tool {
            position: absolute;
            right: 96px;
            /* Positions it slightly overlapping the black box */
            top: 50%;
            transform: translateY(-50%);
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            object-fit: contain;
            z-index: 4;
            pointer-events: none;
            display: none;
            -webkit-user-drag: none;
        }

#map-viewport-container {
    position:fixed;
    left:calc(50dvw - (1230px / 4));
    top:calc(50dvh - (1230px / 4));
    background:black;
    max-width:70dvw;
    max-height:70dvh;
    z-index:345435;
}

    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    /* Stops mobile browsers from scrolling/bouncing the whole page */

    overscroll-behavior: none; 
    touch-action: none;
}
        /* Media Query for small screens */
@media (max-width: 768px) {
    body {
        flex-direction: column; /* Stack columns instead of side-by-side */
    }

    #left-panel {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 2px solid #333;
        padding: 10px;
    }

    #achievements-container {
        display: none; /* Hide achievements as requested */
    }

    #grinders-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 0.95fr));
        gap: 10px;
    }

    .grinder-btn {
        height: 50px; /* Smaller height */
        margin-bottom: 0;
    }
    
    .grinder-btn span {

    }

        width: 32px;

    }

<body>

    <!-- Background Music -->
     <!--Made by github/NotVibeCodedSlop-->
    <audio id="bgm" loop ></audio>

    <div id="left-panel">
        <h1 id="map-title">Grind</h1>
        <div id="grinders-container"></div>
        <div id="map-viewport-container" style="display:none;">
        <div class="ctrl-btn" onclick="toggleMap()" style="z-index:435435435435;">x</div>
        <div id="map-viewport">
            <div id="map-container"></div>
        </div>
        </div>
        <div id="achievements-container">
            <h2>Achievements</h2>
            <div id="achievements-list"></div>
        </div>
    </div>

    <div id="right-panel">
        <div class="header-container">
            <h1 style="margin:0;">Craft</h1><h3 style="font-size:2px;">made by github/NotVibeCodedSlop</h3>
            <div class="header-controls">
                <div class="ctrl-btn" onclick="alert('Pause Toggled!')">⏸</div>
                <div class="ctrl-btn" onclick="resetSave()">⚙</div>
                <div class="ctrl-btn" onclick="toggleMap()">🗺</div>
            </div>
        </div>
        <div id="craft-grid"></div>
    </div>

    <div id="tooltip" class="tooltip"></div>
    <style id="map-marker-thing"></style>
    <script>

document.oncontextmenu = (e) => {
    e.preventDefault(); // Stop the browser menu
};
        // --- GAME STATE ---
        let inventory = { "hand": 1, "none": 1 };
        let achievements = [];
        const gameData = { grinders: [], grinds: {}, crafters: [],markers:[] };
        let timeScale = 1;
        // --- AUDIO SYSTEM ---
        let audioStarted = false;
        const audioCache = {};
        const activeSounds = {};
        let assetRoot = "./game/";
        document.body.addEventListener('click', () => {
            if (!audioStarted) {
                const bgm = document.getElementById('bgm');
                bgm.volume = 0.4;
                bgm.play().catch(e => console.log("BGM blocked by browser:", e));
                audioStarted = true;
            }
        }, { once: true });

        function preloadSounds() {
            const prefixes = new Set();
            prefixes.add("achieve");

            gameData.crafters.forEach(c => {
                if (c.soundPrefix && c.soundPrefix !== "none" && c.soundPrefix !== "") {
                    prefixes.add(c.soundPrefix);
                }
            });

            prefixes.forEach(prefix => {
                audioCache[prefix] = [];
                for (let i = 1; i <= 6; i++) {
                    const audio = new Audio(`${assetRoot}sounds/${prefix}${i}.mp3`);
                    audio.preload = "auto";
                    audio.volume = 0.6;
                    audioCache[prefix].push(audio);
                }
            });
        }

        function playSound(prefix, loopDuration = 0) {
            if (!prefix || prefix === "none" || prefix === "" || !audioCache[prefix]) return;

            if (activeSounds[prefix]) {
                activeSounds[prefix].pause();
                activeSounds[prefix].currentTime = 0;
            }

            const randIndex = Math.floor(Math.random() * 6);
            const snd = audioCache[prefix][randIndex];

            if (loopDuration > 0) {
                snd.loop = true;
                snd.play().catch(e => { });
                activeSounds[prefix] = snd;

                setTimeout(() => {
                    snd.pause();
                    snd.currentTime = 0;
                    snd.loop = false;
                    if (activeSounds[prefix] === snd) {
                        delete activeSounds[prefix];
                    }
                }, loopDuration * 1000 * timeScale);
            } else {
                snd.loop = false;
                snd.play().catch(e => { });
                activeSounds[prefix] = snd;
            }
            snd.speed = timeScale;
        }

        // --- SAVE SYSTEM ---
        function saveGame() {
            if (isResetting) return; // Block saving during reset
            localStorage.setItem('grindcraft_save', JSON.stringify({
                inventory: inventory,
                achievements: achievements
            }));
        }

        function loadGame() {
            const save = localStorage.getItem('grindcraft_save');
            if (save) {
                const parsed = JSON.parse(save);
                inventory = parsed.inventory;
                achievements = parsed.achievements;

                inventory["hand"] = 1;
                inventory["none"] = 1;
            }
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
        // Global variable
        let isResetting = false;

        function resetSave() {
            if (confirm("Are you sure? This will wipe EVERYTHING.")) {
                isResetting = true; // Stop any save attempts
                localStorage.removeItem('grindcraft_save');
                
                // Use a clean reload
                window.location.href = window.location.pathname;
            }
        }
        function toggleMap() {
            const map = document.querySelector("#map-viewport-container");
            if (map.style.display === "block") {
                map.style.display="none";
            } else {
                map.style.display="block";
                initMapMarkers()
            }
        }
        let mainDoc; 
        let mapsArray;
        let activeIntervals = [];
        function clearIntervals() {
            // 1. Clear all intervals
            activeIntervals.forEach(id => clearInterval(id));
            activeIntervals = []; // Reset the list
        }
        // --- BOOT SEQUENCE ---
        async function bootGame(mapindex=null) {
            try {
                loadGame();

                const parser = new DOMParser();

                const mainRes = await fetch(`${assetRoot}data/settings.xml`);
                const mainText = await mainRes.text();
                const mainDoc = parser.parseFromString(mainText, "text/xml");

                const mapNodes = mainDoc.querySelectorAll("maps map");
                const markerNodes = mainDoc.querySelectorAll("markers marker");
                const mapsArray = Array.from(mapNodes).map(node => node.textContent);
                const markersArray = Array.from(markerNodes).map(node => node.textContent);
                let markers = [];
                markersArray.forEach(m => {
                    markersplit = m.split(",")
                    parsedmarker = {name:markersplit[0],x:markersplit[1],y:markersplit[2],unlocked: markersplit[0].trim().replace(/\s+/g, '') === "CityState"}
                    markers.push(parsedmarker);
                })
                gameData.markers = markers;
                let condition = mapindex !== null && typeof(mapindex) === "number";
                const currentMapIndex = (condition) 
                    ? mapindex 
                    : parseInt(mainDoc.querySelector("current_map").textContent);
                console.log(currentMapIndex)
                const currentMapName = mapsArray[currentMapIndex];

                const mapRes = await fetch(`${assetRoot}data/maps/en/${currentMapName}.xml`);
                const mapText = await mapRes.text();
                const mapDoc = parser.parseFromString(mapText, "text/xml");

                parseMapData(mapDoc);
                preloadSounds();
                initUI();

        document.querySelector("audio#bgm").src=`${assetRoot}sounds/1up.ogg`;
        document.querySelector("div#map-container").style.backgroundImage = `url('${assetRoot}img/mapBackground.png')`;
        document.querySelector("style#map-marker-thing").innerText = `.map-marker 
        {background-image:url(${assetRoot}img/sign.png)
        }`;
                activeIntervals.push(setInterval(autoGrindLoop, 100 * timeScale));
            } catch (error) {
                console.error("Failed to load game data:", error);
                document.body.innerHTML = `<h2 style="color:red; padding:20px;">Error loading XML files. Check console.</h2>`;
            }
        }
        async function switchMap(index) {
            // 1. Reset map-specific state
            gameData.markers = []; // Clear current markers
            gameData.crafters = [];
            gameData.grinders = [];
            console.log(index);
            document.getElementById("map-container").innerHTML="";
            document.getElementById("grinders-container").innerHTML="";
            document.getElementById("craft-grid").innerHTML="";
            clearIntervals();
            bootGame(index);
        }
        function initMapMarkers() {
            const container = document.getElementById("map-container");
            container.innerHTML="";
            gameData.markers.forEach(m => {
                if (m.unlocked ){
                const div = document.createElement("div");
                div.className = "map-marker";
                let left = Number(m.x);
                if (m.name === "Chasm Mine") {
                    left = left - 655
                }
                let top = Number(m.y);
                div.style.left = left + "px"; 
                div.style.top = top + "px";
                div.setAttribute("data-name", m.name);
                div.onclick = () => switchMap(gameData.markers.indexOf(m));
                container.appendChild(div);
            }
            });
        }
        // --- PARSING LOGIC ---
        function parseEquation(str) {
            if (!str || str === "nothing=0" || str === "") return {};
            const result = {};
            str.split(",").forEach(pair => {
                const [item, qty] = pair.split("=");
                if (item && item !== "nothing") {
                    result[item.trim()] = parseFloat(qty);
                }
            });
            return result;
        }

        function parseMapData(xmlDoc) {
            xmlDoc.querySelectorAll("grinders item").forEach(el => {
                let occRaw = el.getAttribute("occurance").split(",");
                let sum = occRaw.reduce((acc, val) => val !== "remainder" ? acc + Number(val) : acc, 0);
                let occ = occRaw.map(val => val === "remainder" ? Math.max(0, 100 - sum) : Number(val));

                gameData.grinders.push({
                    name: el.getAttribute("name"),
                    generates: el.getAttribute("generates").split(","),
                    occurance: occ,
                    img: el.getAttribute("img")
                });
            });

            xmlDoc.querySelectorAll("grinds item").forEach(el => {
                gameData.grinds[el.getAttribute("name")] = {
                    drops: parseEquation(el.getAttribute("drops")),
                    dependency: el.getAttribute("dependency").split(","),
                    timeToBreak: el.getAttribute("timeToBreak").split(",").map(Number),

    // Default: Position Bottom-Right of cursor
    let newLeft = e.clientX + offset;
    let newTop = e.clientY + offset;

    // Check bounds: If Bottom-Right pushes it off-screen, flip to Top-Left
    // Window width/height check
    if (newLeft + tooltipWidth > window.innerWidth) {
        newLeft = e.clientX - tooltipWidth - offset; // Flip to Left
    }
    if (newTop + tooltipHeight > window.innerHeight) {
        newTop = e.clientY - tooltipHeight - offset; // Flip to Top
    }

    tooltipEl.style.position = 'fixed';
    tooltipEl.style.left = newLeft + 'px';
    tooltipEl.style.top = newTop + 'px';
    tooltipEl.style.transform = 'none'; // Force no centering
    tooltipEl.style.display = 'block';

const container = document.getElementById("map-container");
const viewport = document.getElementById("map-viewport");

let posX = 0, posY = 0;
let scale = 1;
let isDragging = false;
let startX, startY;

// Helper function to unify coordinates
function getCoords(e) {
    if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
}

function startDrag(e) {
    isDragging = true;
    const coords = getCoords(e);
    startX = coords.x - posX;
    startY = coords.y - posY;
    viewport.style.cursor = 'grabbing';
}

function doDrag(e) {
    if (!isDragging) return;
    
    // Prevent scrolling the whole page while moving the map
    if (e.cancelable) e.preventDefault(); 
    
    const coords = getCoords(e);
    posX = coords.x - startX;
    posY = coords.y - startY;
    
    const scaledWidth = 1230 * scale;
    const scaledHeight = 1230 * scale;

    const minX = Math.min(0, viewport.clientWidth - scaledWidth);
    const minY = Math.min(0, viewport.clientHeight - scaledHeight);
    const maxX = 0;
    const maxY = 0;

    posX = Math.max(minX, Math.min(maxX, posX));
    posY = Math.max(minY, Math.min(maxY, posY));

    container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function endDrag() {
    isDragging = false;
    viewport.style.cursor = 'grab';
}

// Mouse events
viewport.addEventListener('mousedown', startDrag);
